<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
      text-align: center;
      color: #89b4fa;
    }
    .output {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .output input {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      font-family: monospace;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #a6e3a1;
      letter-spacing: 1px;
    }
    button {
      padding: 10px 12px;
      font-size: 13px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #74c7ec; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 13px;
    }
    .row input[type="range"] { width: 140px; }
    .length-val { color: #fab387; font-weight: 600; }
    label { cursor: pointer; }
    .generate {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      font-size: 15px;
    }
    .copy {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-size: 14px;
      background: #a6e3a1;
      color: #1e1e2e;
    }
    .copy:hover { background: #94d88a; }
    .toast {
      text-align: center;
      font-size: 12px;
      color: #a6e3a1;
      margin-top: 6px;
      min-height: 16px;
    }
    .strength {
      height: 6px;
      border-radius: 3px;
      margin: 8px 0;
      background: #45475a;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0;
      transition: width 0.3s, background 0.3s;
    }
  </style>
</head>
<body>
  <h1>Password Maker</h1>
  <div class="output">
    <input type="text" id="password" readonly>
    <button id="copyIcon" title="Kopyala">📋</button>
  </div>
  <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>

  <div class="row">
    <label>Uzunluk: <span class="length-val" id="lenVal">16</span></label>
    <input type="range" id="length" min="8" max="32" value="16">
  </div>
  <div class="row">
    <label><input type="checkbox" id="upper" checked> Büyük harf (A-Z)</label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="lower" checked> Küçük harf (a-z)</label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="digits" checked> Sayılar (0-9)</label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="symbols" checked> Semboller (!@#...)</label>
  </div>

  <button class="generate" id="generate">Parola Oluştur</button>
  <button class="copy" id="copyBtn">Kopyala</button>
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
